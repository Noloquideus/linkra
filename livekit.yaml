port: 7880

bind_addresses:
  - "0.0.0.0"

keys:
  devkey: "supersecretkey_supersecretkey_1234"

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true

  stun_servers:
    - stun:stun.l.google.com:19302

  turn_servers:
  - urls:
      - turn:call.elcsa.online:3478
    username: turnuser
    credential: strongpassword123

logging:
  level: info


