services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "18080:7880"
      - "18081:7881"
      - "17882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      APP_BASE_URL: https://pc.tail5857d2.ts.net
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_PUBLIC_URL: wss://pc.tail5857d2.ts.net:8443
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: supersecretkey_supersecretkey_1234
      CALL_TOKEN_TTL_HOURS: 2
      ROOM_EMPTY_TIMEOUT_SECONDS: 600
      CORS_ALLOW_ORIGINS: https://pc.tail5857d2.ts.net
      TELEGRAM_ALERTING_ENABLED: true
      TELEGRAM_BOT_TOKEN: 8299710711:AAFoAXRsV-CMlo5OnJeITiMWgKsTvetB2M8
      TELEGRAM_CHAT_ID: -1003333378268
      TELEGRAM_TOPIC_ID: 2
    ports:
      - "18000:8000"
    depends_on:
      - livekit
    restart: unless-stopped