services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: linkra-livekit
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "127.0.0.1:7880:7880"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - linkra_net

  backend:
    build:
      context: ./backend
    container_name: linkra-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - livekit
    networks:
      - linkra_net

networks:
  linkra_net:
    driver: bridge